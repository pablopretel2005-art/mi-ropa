<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
<meta name="apple-mobile-web-app-title" content="Mi Ropa"/>
<meta name="theme-color" content="#fafafa"/>
<title>Organizador de Ropa</title>
<style>
  *{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
  body{font-family:-apple-system,BlinkMacSystemFont,'Helvetica Neue',sans-serif;background:#fafafa;min-height:100vh;padding:env(safe-area-inset-top,20px) 16px 40px;color:#111}
  h1{font-size:24px;font-weight:700;letter-spacing:-.04em;margin-bottom:4px}
  .sub{font-size:13px;color:#999;margin-bottom:24px;letter-spacing:-.01em}
  .layout{display:flex;gap:16px;align-items:flex-start}
  .divider{width:1px;background:#e5e5e5;align-self:stretch;flex-shrink:0;margin:0 2px}
  .col{flex:1;min-width:0}
  .col-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px}
  .col-title{display:flex;align-items:center;gap:7px;font-size:15px;font-weight:600;letter-spacing:-.02em}
  .badge{background:#111;color:#fff;border-radius:20px;font-size:10px;font-weight:600;padding:2px 7px;letter-spacing:.02em}
  .add-btn{width:30px;height:30px;border-radius:50%;background:#111;border:none;cursor:pointer;display:flex;align-items:center;justify-content:center;color:#fff;font-size:18px;line-height:1;flex-shrink:0}
  .dropzone{min-height:280px;border-radius:16px;border:2px dashed #e0e0e0;background:#fff;padding:10px;display:grid;grid-template-columns:repeat(auto-fill,minmax(95px,1fr));gap:8px;align-content:start;transition:border-color .15s,background .15s}
  .dropzone.over{border-color:#111;background:#f7f7f7}
  .empty{grid-column:1/-1;display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:200px;color:#ccc;gap:8px;font-size:12px;font-weight:500}
  .card{background:#fff;border-radius:12px;border:1px solid #e5e5e5;overflow:hidden;cursor:grab;user-select:none;transition:opacity .15s,box-shadow .15s;box-shadow:0 1px 4px rgba(0,0,0,.06)}
  .card:active{cursor:grabbing}
  .card.dragging{opacity:.3}
  .card-img{width:100%;height:90px;background:#f5f5f5;display:flex;align-items:center;justify-content:center;overflow:hidden;font-size:30px}
  .card-img img{width:100%;height:100%;object-fit:cover}
  .card-foot{padding:6px 6px 5px;display:flex;align-items:center;justify-content:space-between;gap:4px}
  .card-name{font-size:11px;font-weight:500;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;flex:1;letter-spacing:-.01em}
  .del-btn{background:none;border:none;cursor:pointer;color:#ccc;font-size:14px;padding:1px;flex-shrink:0;line-height:1}
  /* Modal */
  .overlay{position:fixed;inset:0;background:rgba(0,0,0,.3);backdrop-filter:blur(8px);-webkit-backdrop-filter:blur(8px);display:flex;align-items:flex-end;justify-content:center;padding:16px;z-index:100}
  .modal{background:#fff;border-radius:20px;padding:24px;width:100%;max-width:360px;margin-bottom:8px;box-shadow:0 30px 80px rgba(0,0,0,.2)}
  .modal-label{font-size:11px;font-weight:600;color:#999;letter-spacing:.08em;text-transform:uppercase;margin-bottom:4px}
  .modal-title{font-size:20px;font-weight:700;letter-spacing:-.03em;margin-bottom:20px}
  .photo-pick{width:100%;height:140px;border-radius:14px;border:1.5px dashed #ddd;background:#fafafa;display:flex;align-items:center;justify-content:center;cursor:pointer;overflow:hidden;margin-bottom:14px;flex-direction:column;gap:6px;color:#bbb;font-size:12px}
  .photo-pick img{width:100%;height:100%;object-fit:cover}
  input[type=text]{width:100%;padding:13px 14px;border-radius:12px;border:1.5px solid #e5e5e5;font-size:15px;font-family:inherit;font-weight:500;letter-spacing:-.01em;background:#fafafa;color:#111;outline:none;margin-bottom:14px}
  .btns{display:flex;gap:10px}
  .btn-cancel{flex:1;padding:13px;border-radius:12px;border:1.5px solid #e5e5e5;background:#fff;font-size:14px;font-weight:600;font-family:inherit;color:#555;cursor:pointer;letter-spacing:-.01em}
  .btn-add{flex:1;padding:13px;border-radius:12px;border:none;background:#111;color:#fff;font-size:14px;font-weight:600;font-family:inherit;cursor:pointer;letter-spacing:-.01em;transition:opacity .15s}
  .btn-add:disabled{opacity:.3;cursor:not-allowed}
</style>
</head>
<body>
<h1>Organizador de Ropa</h1>
<p class="sub">Arrastra las prendas entre casas o usa el +</p>

<div class="layout">
  <div class="col" id="col-mama">
    <div class="col-header">
      <div class="col-title">
        <svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M3 9.5L12 3l9 6.5V21H3V9.5z"/><rect x="9" y="14" width="6" height="7"/></svg>
        Casa Mamá <span class="badge" id="badge-mama">0</span>
      </div>
      <button class="add-btn" onclick="openModal('mama')">+</button>
    </div>
    <div class="dropzone" id="zone-mama"
      ondragover="onDragOver(event,'mama')"
      ondragleave="onDragLeave()"
      ondrop="onDrop(event,'mama')"
      ontouchend="onTouchDrop('mama')">
      <div class="empty" id="empty-mama">
        <svg viewBox="0 0 24 24" width="28" height="28" fill="none" stroke="currentColor" stroke-width="1.2"><rect x="3" y="3" width="18" height="18" rx="3"/><path d="M9 12h6M12 9v6" stroke-linecap="round"/></svg>
        Arrastra aquí
      </div>
    </div>
  </div>

  <div class="divider"></div>

  <div class="col" id="col-papa">
    <div class="col-header">
      <div class="col-title">
        <svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M3 9.5L12 3l9 6.5V21H3V9.5z"/><rect x="9" y="14" width="6" height="7"/></svg>
        Casa Papá <span class="badge" id="badge-papa">0</span>
      </div>
      <button class="add-btn" onclick="openModal('papa')">+</button>
    </div>
    <div class="dropzone" id="zone-papa"
      ondragover="onDragOver(event,'papa')"
      ondragleave="onDragLeave()"
      ondrop="onDrop(event,'papa')"
      ontouchend="onTouchDrop('papa')">
      <div class="empty" id="empty-papa">
        <svg viewBox="0 0 24 24" width="28" height="28" fill="none" stroke="currentColor" stroke-width="1.2"><rect x="3" y="3" width="18" height="18" rx="3"/><path d="M9 12h6M12 9v6" stroke-linecap="round"/></svg>
        Arrastra aquí
      </div>
    </div>
  </div>
</div>

<!-- Modal -->
<div class="overlay" id="modal" style="display:none" onclick="closeModal()">
  <div class="modal" onclick="event.stopPropagation()">
    <p class="modal-label" id="modal-label">Casa Mamá</p>
    <p class="modal-title">Nueva prenda</p>
    <div class="photo-pick" id="photo-pick" onclick="document.getElementById('file-input').click()">
      <svg viewBox="0 0 24 24" width="26" height="26" fill="none" stroke="currentColor" stroke-width="1.5"><rect x="3" y="3" width="18" height="18" rx="3"/><circle cx="8.5" cy="8.5" r="1.5"/><polyline points="21 15 16 10 5 21"/></svg>
      Añadir foto (opcional)
    </div>
    <input type="file" id="file-input" accept="image/*" style="display:none" onchange="handleFile(event)"/>
    <input type="text" id="name-input" placeholder="Nombre de la prenda" oninput="checkAdd()" onkeydown="if(event.key==='Enter')addItem()"/>
    <div class="btns">
      <button class="btn-cancel" onclick="closeModal()">Cancelar</button>
      <button class="btn-add" id="btn-add" onclick="addItem()" disabled>Añadir</button>
    </div>
  </div>
</div>

<script>
let items = JSON.parse(localStorage.getItem('ropa-items') || '[]');
let nextId = items.length ? Math.max(...items.map(i=>i.id))+1 : 1;
let addingTo = null;
let newPhoto = null;
let dragId = null;
let touchDragId = null;
let touchClone = null;
let touchOriginHouse = null;

function save(){ localStorage.setItem('ropa-items', JSON.stringify(items)); }

function render(){
  ['mama','papa'].forEach(house=>{
    const zone = document.getElementById('zone-'+house);
    const empty = document.getElementById('empty-'+house);
    const badge = document.getElementById('badge-'+house);
    const houseItems = items.filter(i=>i.house===house);
    badge.textContent = houseItems.length;
    // remove old cards
    zone.querySelectorAll('.card').forEach(c=>c.remove());
    empty.style.display = houseItems.length ? 'none' : 'flex';
    houseItems.forEach(item=>{
      const card = document.createElement('div');
      card.className = 'card';
      card.draggable = true;
      card.dataset.id = item.id;
      card.innerHTML = `
        <div class="card-img">${item.photo?`<img src="${item.photo}" alt="${item.name}"/>`:'👕'}</div>
        <div class="card-foot">
          <span class="card-name">${item.name}</span>
          <button class="del-btn" onclick="deleteItem(${item.id})">✕</button>
        </div>`;
      card.addEventListener('dragstart',e=>{dragId=item.id;setTimeout(()=>card.classList.add('dragging'),0);});
      card.addEventListener('dragend',()=>{dragId=null;card.classList.remove('dragging');});
      // Touch drag
      card.addEventListener('touchstart',e=>onTouchStart(e,item.id,house),{passive:true});
      card.addEventListener('touchmove',onTouchMove,{passive:false});
      zone.appendChild(card);
    });
  });
}

function deleteItem(id){ items=items.filter(i=>i.id!==id); save(); render(); }

// Drag & Drop (desktop)
function onDragOver(e,house){ e.preventDefault(); document.getElementById('zone-'+house).classList.add('over'); }
function onDragLeave(){ document.querySelectorAll('.dropzone').forEach(z=>z.classList.remove('over')); }
function onDrop(e,house){
  e.preventDefault();
  onDragLeave();
  if(dragId===null) return;
  items = items.map(i=>i.id===dragId?{...i,house}:i);
  dragId=null; save(); render();
}

// Touch drag (mobile)
function onTouchStart(e,id,house){
  touchDragId=id; touchOriginHouse=house;
  const card=e.currentTarget;
  const rect=card.getBoundingClientRect();
  touchClone=card.cloneNode(true);
  touchClone.style.cssText=`position:fixed;top:${rect.top}px;left:${rect.left}px;width:${rect.width}px;opacity:.75;pointer-events:none;z-index:999;border-radius:12px;box-shadow:0 8px 30px rgba(0,0,0,.2);transition:none`;
  document.body.appendChild(touchClone);
  card.style.opacity='.3';
}
function onTouchMove(e){
  if(!touchClone) return;
  e.preventDefault();
  const t=e.touches[0];
  touchClone.style.left=(t.clientX-50)+'px';
  touchClone.style.top=(t.clientY-50)+'px';
  // highlight zones
  document.querySelectorAll('.dropzone').forEach(z=>{
    const r=z.getBoundingClientRect();
    const over=t.clientX>=r.left&&t.clientX<=r.right&&t.clientY>=r.top&&t.clientY<=r.bottom;
    z.classList.toggle('over',over);
  });
}
function onTouchDrop(house){
  if(touchDragId===null) return;
  // check if finger is over this zone
  const zone=document.getElementById('zone-'+house);
  if(zone.classList.contains('over')){
    items=items.map(i=>i.id===touchDragId?{...i,house}:i);
    save();
  }
  cleanTouch();
  render();
}
document.addEventListener('touchend',e=>{
  if(!touchDragId) return;
  const t=e.changedTouches[0];
  let dropped=false;
  ['mama','papa'].forEach(house=>{
    const zone=document.getElementById('zone-'+house);
    const r=zone.getBoundingClientRect();
    if(t.clientX>=r.left&&t.clientX<=r.right&&t.clientY>=r.top&&t.clientY<=r.bottom){
      items=items.map(i=>i.id===touchDragId?{...i,house}:i);
      dropped=true;
    }
  });
  if(dropped) save();
  cleanTouch();
  render();
},{passive:true});
function cleanTouch(){
  if(touchClone){ touchClone.remove(); touchClone=null; }
  touchDragId=null; touchOriginHouse=null;
  document.querySelectorAll('.dropzone').forEach(z=>z.classList.remove('over'));
  document.querySelectorAll('.card').forEach(c=>c.style.opacity='');
}

// Modal
function openModal(house){
  addingTo=house; newPhoto=null;
  document.getElementById('modal-label').textContent='Casa '+(house==='mama'?'Mamá':'Papá');
  document.getElementById('name-input').value='';
  document.getElementById('btn-add').disabled=true;
  const pp=document.getElementById('photo-pick');
  pp.innerHTML='<svg viewBox="0 0 24 24" width="26" height="26" fill="none" stroke="currentColor" stroke-width="1.5"><rect x="3" y="3" width="18" height="18" rx="3"/><circle cx="8.5" cy="8.5" r="1.5"/><polyline points="21 15 16 10 5 21"/></svg>Añadir foto (opcional)';
  document.getElementById('modal').style.display='flex';
  setTimeout(()=>document.getElementById('name-input').focus(),100);
}
function closeModal(){ document.getElementById('modal').style.display='none'; }
function checkAdd(){ document.getElementById('btn-add').disabled=!document.getElementById('name-input').value.trim(); }
function handleFile(e){
  const file=e.target.files[0]; if(!file) return;
  const r=new FileReader();
  r.onload=ev=>{
    newPhoto=ev.target.result;
    const pp=document.getElementById('photo-pick');
    pp.innerHTML=`<img src="${newPhoto}" style="width:100%;height:100%;object-fit:cover;border-radius:12px"/>`;
  };
  r.readAsDataURL(file);
}
function addItem(){
  const name=document.getElementById('name-input').value.trim();
  if(!name) return;
  items.push({id:nextId++,name,photo:newPhoto,house:addingTo});
  save(); render(); closeModal();
}

render();
</script>
</body>
</html>
